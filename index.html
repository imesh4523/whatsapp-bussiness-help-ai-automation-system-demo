<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="AI sales agent for WhatsApp and website chat. AgentBunny replies, recommends products, collects orders, and helps businesses grow sales automatically." />
    <meta name="keywords" content="WhatsApp AI Bot, WhatsApp AI Assistant, WhatsApp Marketing, Automated Sales Agent, WhatsApp E-commerce, Chatbot, AgentBunny" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="AgentBunny Team" />
    <meta name="theme-color" content="#00832e" />
    <link rel="canonical" href="https://agentbunny.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agentbunny.com" />
    <meta property="og:title" content="AgentBunny - WhatsApp AI Sales Agent" />
    <meta property="og:description" content="AI sales agent for WhatsApp and website chat. AgentBunny replies, recommends products, collects orders, and helps businesses grow sales automatically." />
    <meta property="og:image" content="https://agentbunny.com/agentbunny-logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://agentbunny.com" />
    <meta property="twitter:title" content="AgentBunny - WhatsApp AI Sales Agent" />
    <meta property="twitter:description" content="AI sales agent for WhatsApp and website chat. AgentBunny replies, recommends products, collects orders, and helps businesses grow sales automatically." />
    <meta property="twitter:image" content="https://agentbunny.com/agentbunny-logo.png" />

    <!-- Structured Data JSON-LD for Sitelinks Search Box and Rich Snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AgentBunny",
      "alternateName": "Agent Bunny",
      "url": "https://agentbunny.com",
      "logo": "https://agentbunny.com/agentbunny-logo.png",
      "description": "AI sales agent for WhatsApp and website chat. AgentBunny replies, recommends products, collects orders, and helps businesses grow sales automatically.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "LKR"
      },
      "hasPart": [
        {
          "@type": "WebPage",
          "name": "Pricing",
          "url": "https://agentbunny.com/user/subscription/index",
          "description": "AgentBunny pricing plans start from Free trial to Pro and Elite packages."
        },
        {
          "@type": "WebPage",
          "name": "About",
          "url": "https://agentbunny.com/user/dashboard",
          "description": "Convert WhatsApp messages and website chats into sales automatically."
        },
        {
          "@type": "WebPage",
          "name": "Signup",
          "url": "https://agentbunny.com/register",
          "description": "Create an account and start managing your WhatsApp business automation."
        },
        {
          "@type": "WebPage",
          "name": "E-Commerce",
          "url": "https://agentbunny.com/user/woocommerce",
          "description": "AI sales agent for WhatsApp and website e-commerce storefront integrations."
        }
      ]
    }
    </script>
    <style>
      .preloader-static {
        position: fixed;
        z-index: 999999;
        background-color: #ffffff;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader-static {
        width: 48px;
        height: 48px;
        border: 3px dotted #00832e;
        border-style: solid solid dotted dotted;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation-static 1s linear infinite;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
      }
      .loader-static::after {
        content: "";
        box-sizing: border-box;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        border: 3px dotted rgba(0, 131, 46, 0.5);
        border-style: solid solid dotted;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        animation: rotationBack-static 0.5s linear infinite;
        transform-origin: center center;
      }
      @keyframes rotation-static {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotationBack-static {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Static Preloader to prevent blank white flash on load -->
    <div id="preloader-static" class="preloader-static">
      <span class="loader-static"></span>
    </div>
    
    <script>
      // Only show the preloader if we are navigating to a dashboard/user route and logged in
      const path = window.location.pathname;
      const isDashboardRoute = path.startsWith('/user') || path.startsWith('/help') || path.startsWith('/ticket') || path.startsWith('/user-guide');
      const savedUser = localStorage.getItem('aura_user');
      
      if (!isDashboardRoute || !savedUser) {
        document.getElementById('preloader-static').style.display = 'none';
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
