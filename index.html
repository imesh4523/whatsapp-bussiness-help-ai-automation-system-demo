<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/agentbunny-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentBunny</title>
    <style>
      .preloader-static {
        position: fixed;
        z-index: 999999;
        background-color: #ffffff;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader-static {
        width: 48px;
        height: 48px;
        border: 3px dotted #00832e;
        border-style: solid solid dotted dotted;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation-static 1s linear infinite;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
      }
      .loader-static::after {
        content: "";
        box-sizing: border-box;
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        border: 3px dotted rgba(0, 131, 46, 0.5);
        border-style: solid solid dotted;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        animation: rotationBack-static 0.5s linear infinite;
        transform-origin: center center;
      }
      @keyframes rotation-static {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotationBack-static {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Static Preloader to prevent blank white flash on load -->
    <div id="preloader-static" class="preloader-static">
      <span class="loader-static"></span>
    </div>
    
    <script>
      // Only show the preloader if we are navigating to a dashboard/user route and logged in
      const path = window.location.pathname;
      const isDashboardRoute = path.startsWith('/user') || path.startsWith('/help') || path.startsWith('/ticket') || path.startsWith('/user-guide');
      const savedUser = localStorage.getItem('aura_user');
      
      if (!isDashboardRoute || !savedUser) {
        document.getElementById('preloader-static').style.display = 'none';
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
